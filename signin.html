<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Parking - Sign In</title>
  <style>
    body { 
      font-family: Arial,sans-serif; 
      background:url("smartparking.avif") no-repeat center center fixed; 
      background-size:cover; 
      display:flex; 
      justify-content:center; 
      align-items:center; 
      height:100vh; margin:0; 
    }
    .container { 
      background: rgba(255,255,255,0.9); 
      padding:30px; 
      border-radius:10px; 
      box-shadow:0 4px 10px rgba(0,0,0,0.3); 
      width:350px; 
      text-align:center; 
    }
    h2 { 
      color:#333; 
    }
    input { 
      width:90%; 
      padding:10px; 
      margin:8px 0; 
      border:1px solid #ccc; 
      border-radius:5px; 
    }
    button { 
      width:95%; 
      padding:10px; 
      background:#2196F3; 
      color:white; 
      border:none; 
      border-radius:5px; 
      cursor:pointer; 
    }
    button:hover { 
      background:#0b7dda; 
    }
    p { 
      margin-top:15px; 
    }
    a { 
      color:#007BFF; 
      text-decoration:none; 
    }
    a:hover { 
      text-decoration:underline; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🚗ParkZone - Sign In🚗</h2>
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="password" id="password" placeholder="Password" required><br>
    <button onclick="signin()">Sign In</button>
  </div>

  <script>
    async function signin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if(!email || !password){ alert("Fill all fields"); return; }

      try {
        const res = await fetch("http://localhost:4000/signin", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({email,password})
        });

        const data = await res.json();
        if(data.success){
          localStorage.setItem("username", data.name);
          if(data.role === "admin") window.location.href="admin.html";
          else window.location.href="parking.html";
        } else alert(data.message);
      } catch(err){ console.error(err); alert("Server not running"); }
    }
  </script>
</body>
</html>
